{% extends "base.html" %}

{% block title %}{{ filename }} - Triton Admin{% endblock %}

{% block content %}
<div class="markdown-viewer" x-data="markdownViewer()" x-init="init()">
    <div class="page-header">
        <a :href="window.ROOT_PATH + '/results-page'" class="back-link">&larr; Back to Results</a>
        <h2 x-text="filename || 'Loading...'">{{ filename }}</h2>
    </div>

    <div class="markdown-content" x-show="!loading && !error">
        <div id="markdown-body" class="markdown-body"></div>
    </div>

    <div class="loading" x-show="loading">
        <p>Loading document...</p>
    </div>

    <div class="error" x-show="error">
        <p class="error-message" x-text="error"></p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
.markdown-viewer {
    max-width: 900px;
    margin: 0 auto;
}

.markdown-content {
    background: var(--card-bg);
    border-radius: var(--radius-md);
    padding: 2rem;
    margin-top: 1rem;
}

.markdown-body {
    line-height: 1.7;
}

.markdown-body h1, .markdown-body h2, .markdown-body h3,
.markdown-body h4, .markdown-body h5, .markdown-body h6 {
    margin-top: 1.5em;
    margin-bottom: 0.5em;
    font-weight: 600;
    color: var(--text-color);
}

.markdown-body h1 { font-size: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
.markdown-body h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
.markdown-body h3 { font-size: 1.25rem; }
.markdown-body h4 { font-size: 1rem; }

.markdown-body p {
    margin: 1em 0;
}

.markdown-body code {
    background: var(--bg-color);
    padding: 0.2em 0.4em;
    border-radius: 3px;
    font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
    font-size: 0.9em;
}

.markdown-body pre {
    background: var(--bg-color);
    padding: 1rem;
    border-radius: var(--radius-sm);
    overflow-x: auto;
    margin: 1em 0;
}

.markdown-body pre code {
    background: none;
    padding: 0;
}

.markdown-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0;
}

.markdown-body th, .markdown-body td {
    border: 1px solid var(--border-color);
    padding: 0.5rem 1rem;
    text-align: left;
}

.markdown-body th {
    background: var(--bg-color);
    font-weight: 600;
}

.markdown-body tr:nth-child(even) {
    background: var(--bg-color);
}

.markdown-body blockquote {
    border-left: 4px solid var(--primary-color);
    margin: 1em 0;
    padding: 0.5em 1em;
    background: var(--bg-color);
    color: var(--text-muted);
}

.markdown-body ul, .markdown-body ol {
    margin: 1em 0;
    padding-left: 2em;
}

.markdown-body li {
    margin: 0.25em 0;
}

.markdown-body a {
    color: var(--primary-color);
    text-decoration: none;
}

.markdown-body a:hover {
    text-decoration: underline;
}

.markdown-body img {
    max-width: 100%;
    height: auto;
    border-radius: var(--radius-sm);
}

.markdown-body hr {
    border: none;
    border-top: 1px solid var(--border-color);
    margin: 2em 0;
}

.error-message {
    color: var(--danger-color);
    padding: 1rem;
    background: rgba(220, 38, 38, 0.1);
    border-radius: var(--radius-sm);
}
</style>

<script>
function markdownViewer() {
    return {
        filename: '{{ filename }}',
        path: '{{ path }}',
        content: '',
        loading: true,
        error: null,

        async init() {
            await this.loadContent();
        },

        async loadContent() {
            this.loading = true;
            this.error = null;

            try {
                const res = await fetch(buildUrl(`/api/testing/results/${this.path}/content`));
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }
                const data = await res.json();
                this.filename = data.filename;
                this.content = data.content;

                // Render markdown
                if (data.type === 'markdown') {
                    document.getElementById('markdown-body').innerHTML = marked.parse(this.content);
                } else {
                    document.getElementById('markdown-body').innerHTML = `<pre>${this.escapeHtml(this.content)}</pre>`;
                }
            } catch (err) {
                this.error = `Failed to load document: ${err.message}`;
            }

            this.loading = false;
        },

        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        },
    };
}
</script>
{% endblock %}
