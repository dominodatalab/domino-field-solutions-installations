apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.env.name }}-proxy
  namespace: {{ .Values.env.namespace }}
  labels:
    app: {{ .Values.env.name }}-proxy
    type: {{ .Values.env.type }}
spec:
  selector:
    app: {{ .Values.env.name }}-proxy
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
    protocol: TCP
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP